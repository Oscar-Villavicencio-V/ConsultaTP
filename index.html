<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Datos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container { 
            max-width: 1200px; margin: 0 auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; padding: 25px 20px; text-align: center; 
        }
        .header h1 { font-size: clamp(1.5em, 5vw, 2.5em); margin-bottom: 5px; font-weight: 700; }
        .header p { font-size: clamp(0.9em, 3vw, 1.1em); opacity: 0.95; }
        .content { padding: 25px 20px; }
        .section {
            margin-bottom: 30px;
        }
        .section h3 {
            color: #4facfe; 
            margin-bottom: 15px; 
            font-size: 1.4em;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 8px;
        }
        .last-update { 
            text-align: center; 
            color: #666; 
            margin-bottom: 25px; 
            font-size: 0.95em; 
            font-style: italic;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
        }
        .embed-container {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-bottom: 70%;
            background: #f8f9fa; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .embed-container iframe {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important;
            border: none; 
            border-radius: 15px; 
            min-height: 500px;
        }
        .footer { 
            background: #f8f9fa; 
            padding: 20px; 
            text-align: center; 
            color: #666; 
            font-size: 0.9em; 
            border-top: 1px solid #e9ecef;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { border-radius: 15px; margin: 5px; }
            .header { padding: 20px 15px; }
            .content { padding: 20px 15px; }
            .embed-container { padding-bottom: 85%; min-height: 450px; }
            .section h3 { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 CONSULTA TP</h1>
            <p>Actualizado automáticamente • Ambas tablas</p>
        </div>
        <div class="content">
            <div class="last-update">
                Última actualización: <span id="timestamp"></span> | 
                🔄 Auto-refrescado: <span id="refreshCount">0</span>
            </div>
            
            <!-- TABLA 1: PAGOS -->
            <div class="section">
                <h3>💰 Tabla Pagos</h3>
                <div class="embed-container">
<iframe width="523" height="900" frameborder="0" scrolling="no" src="https://1drv.ms/x/c/61713811d5b05360/IQSHF-vXI5JzQ5EmG6v5W6bJAS0RONKjL4kiNlZEzEDRYHk?em=2&Item=Tabla1&wdHideGridlines=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0"></iframe>
                </div>
            </div>
            
            <!-- TABLA 2: DESEMBOLSOS -->
            <div class="section">
                <h3>💸 Tabla Desembolsos</h3>
                <div class="embed-container">
<iframe width="700" height="900" frameborder="0" scrolling="no" src="https://1drv.ms/x/c/61713811d5b05360/IQSHF-vXI5JzQ5EmG6v5W6bJAS0RONKjL4kiNlZEzEDRYHk?em=2&Item=Tabla2&wdHideGridlines=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0"></iframe>
                </div>
            </div>
        </div>
        <div class="footer">
            🔄 Sincronizado con OneDrive cada 2 min • 📱 Optimizado móvil • ✅ Sin pestañas
        </div>
    </div>

    <script>
        // ⏰ TIMESTAMP
        function updateTime() {
            document.getElementById('timestamp').textContent = 
                new Date().toLocaleString('es-ES');
        }
        updateTime();
        setInterval(updateTime, 30000);
        
        // 🔄 AUTO REFRESH AMBAS TABLAS
        let refreshCounter = 0;
        function autoRefresh() {
            refreshCounter++;
            document.querySelectorAll('iframe').forEach((iframe, index) => {
                const cacheBuster = Date.now();
                iframe.src = iframe.src.split('?')[0] + `?v=${cacheBuster}`;
            });
            document.getElementById('refreshCount').textContent = refreshCounter;
        }
        
        // Inicia y cada 2 minutos
        autoRefresh();
        setInterval(autoRefresh, 120000);
    </script>
</body>
</html>
