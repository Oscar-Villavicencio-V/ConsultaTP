<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta TP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { font-size: clamp(1.5em, 5vw, 2.5em); margin-bottom: 5px; font-weight: 700; }
        .content { padding: 25px 20px; }
        .section { margin-bottom: 30px; }
        .section h3 { color: #4facfe; margin-bottom: 15px; font-size: 1.4em; border-bottom: 2px solid #e9ecef; padding-bottom: 8px; }
        .status { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.95em; background: #f8f9fa; padding: 12px; border-radius: 10px; }
        .embed-container { position: relative; width: 100%; height: 0; padding-bottom: 70%; background: #f8f9fa; border-radius: 15px; overflow: hidden; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .embed-container iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; border: none; border-radius: 15px; min-height: 500px; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #666; font-size: 0.9em; border-top: 1px solid #e9ecef; }
        @media (max-width: 768px) { body { padding: 5px; } .container { border-radius: 15px; margin: 5px; } .header { padding: 20px 15px; } .content { padding: 20px 15px; } .embed-container { padding-bottom: 85%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 CONSULTA TP</h1>
            <p>Tablas Pagos y Desembolsos • Actualización automática</p>
        </div>
        <div class="content">
            <div class="status">
                ⏰ <span id="timestamp"></span> | 
                🔄 Refrescado: <span id="refreshCount">0</span>
            </div>
            
            <!-- TABLA 1: PAGOS - RANGO ESPECÍFICO -->
            <div class="section">
                <h3>💰 Tabla Pagos</h3>
                <div class="embed-container">
                    <iframe src="https://1drv.ms/x/c/61713811d5b05360/IQSHF-vXI5JzQ5EmG6v5W6bJAS0RONKjL4kiNlZEzEDRYHk?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdHideRibbon=True&wdBackgroundCount=1&activeCell='Tabla1'!A1&item='Tabla1'!A:B"></iframe>
                </div>
            </div>
            
            <!-- TABLA 2: DESEMBOLSOS - RANGO ESPECÍFICO -->
            <div class="section">
                <h3>💸 Tabla Desembolsos</h3>
                <div class="embed-container">
                    <iframe src="https://1drv.ms/x/c/61713811d5b05360/IQSHF-vXI5JzQ5EmG6v5W6bJAS0RONKjL4kiNlZEzEDRYHk?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdHideRibbon=True&wdBackgroundCount=1&activeCell='Tabla2'!A1&item='Tabla2'!A:B"></iframe>
                </div>
            </div>
        </div>
        <div class="footer">
            🔄 Auto-refrescado cada 2 min • 📱 Responsive • ✅ Sin pestañas Excel
        </div>
    </div>

    <script>
        // Timestamp
        function updateTime() {
            document.getElementById('timestamp').textContent = new Date().toLocaleString('es-ES');
        }
        updateTime(); setInterval(updateTime, 30000);
        
        // Auto-refresh TODAS las tablas
        let refreshCounter = 0;
        function autoRefresh() {
            refreshCounter++;
            document.querySelectorAll('iframe').forEach(iframe => {
                const baseUrl = iframe.src.split('&wdHideGridlines')[0];
                const cacheBuster = Date.now();
                iframe.src = baseUrl + `&v=${cacheBuster}&wdHideGridlines=True&wdHideHeaders=True&wdHideRibbon=True&wdAllowInteractivity=False`;
            });
            document.getElementById('refreshCount').textContent = refreshCounter;
        }
        autoRefresh();
        setInterval(autoRefresh, 120000); // 2 minutos
    </script>
</body>
</html>
